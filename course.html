const STEPS=[{k:'slides',ic:'📊',lbl:'Study slide'},{k:'concept',ic:'▶',lbl:'Concept animation'},{k:'real',ic:'🌍',lbl:'Real-world analogy'}];
const SEQ=[], posOf={};
course.forEach((U,ui)=>U.topics.forEach((tp,ti)=>STEPS.forEach((st,si)=>{ posOf[ui+'-'+ti+'-'+si]=SEQ.length; SEQ.push({ui,ti,si}); })));
let cur=0, curUnit=-1;
const el=id=>document.getElementById(id);
function srcFor(U,tp,k){
  if(k==='slides') return 'u'+U.u+'/study.html?embed=1&t='+(tp.n-1)+'&only=1';
  if(k==='concept') return 'u'+U.u+'/lessons/'+tp.concept;
  return 'u'+U.u+'/lessons/'+tp.real;
}
function buildUnitSelect(){ el('uSel').innerHTML=course.map((U,i)=>'<option value="'+i+'">Unit '+U.u+' — '+U.short+'</option>').join(''); }
function buildSidebar(ui){
  const U=course[ui]; let h='';
  U.topics.forEach((tp,ti)=>{
    h+='<div class="tp" id="tp-'+ti+'"><div class="tp-h" onclick="goto('+ui+','+ti+',0)"><span class="tp-n">'+tp.n+'</span><span class="tp-t">'+tp.title+'</span></div><div class="tp-s">';
    STEPS.forEach((st,si)=>{ h+='<button class="st" id="st-'+ti+'-'+si+'" onclick="goto('+ui+','+ti+','+si+')">'+st.ic+'&nbsp; '+st.lbl+'</button>'; });
    h+='</div></div>';
  });
  el('nav').innerHTML=h;
  el('sideHead').textContent='UNIT '+U.u+' · '+U.topics.length+' TOPICS';
}
function goto(ui,ti,si){ cur=posOf[ui+'-'+ti+'-'+si]; render(); if(window.innerWidth<=860) document.body.classList.remove('navopen'); }
window.goto=goto;
function render(){
  const s=SEQ[cur], U=course[s.ui], tp=U.topics[s.ti], st=STEPS[s.si];
  if(s.ui!==curUnit){ curUnit=s.ui; buildSidebar(s.ui); el('uSel').value=s.ui; }
  const fr=el('frame'), src=srcFor(U,tp,st.k);
  if(fr.getAttribute('src')!==src) fr.setAttribute('src',src);
  el('bc').innerHTML='<b>Unit '+U.u+'</b> · Topic '+tp.n+'/'+U.topics.length+' — '+tp.title+'<span class="step">'+st.ic+' '+st.lbl+'</span>';
  document.querySelectorAll('.st.on').forEach(b=>b.classList.remove('on'));
  const a=el('st-'+s.ti+'-'+s.si); if(a) a.classList.add('on');
  document.querySelectorAll('.tp.cur').forEach(x=>x.classList.remove('cur'));
  const tpe=el('tp-'+s.ti); if(tpe){ tpe.classList.add('cur'); if(tpe.scrollIntoView)try{tpe.scrollIntoView({block:'nearest'});}catch(e){} }
  el('prev').disabled=cur<=0; el('next').disabled=cur>=SEQ.length-1;
  el('pos').textContent=(cur+1)+' / '+SEQ.length;
  try{ history.replaceState(null,'','#u='+U.u+'&t='+tp.n+'&s='+st.k); }catch(e){}
}
function step(d){ const n=cur+d; if(n>=0&&n<SEQ.length){ cur=n; render(); } }
window.courseStep=step;   // embedded deck hands off at its slide boundaries
function deckPage(d){ try{ const w=el('frame').contentWindow; if(d>0){ if(w.next) return w.next(); } else { if(w.prev) return w.prev(); } step(d); }catch(e){ step(d); } }
function keyNav(d){ if(SEQ[cur].si===0) deckPage(d); else step(d); }
function onKey(e){ if(e.metaKey||e.ctrlKey||e.altKey) return; if(e.target&&/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName)) return; const k=e.key;
  if(k==='ArrowRight'||k==='PageDown'){ e.preventDefault(); keyNav(1); }
  else if(k==='ArrowLeft'||k==='PageUp'){ e.preventDefault(); keyNav(-1); }
  else if(k==='m'||k==='M'){ toggleNav(); } }
el('prev').onclick=()=>step(-1); el('next').onclick=()=>step(1);
el('uSel').onchange=e=>goto(+e.target.value,0,0);
function toggleNav(){ if(window.innerWidth>860){ document.body.classList.toggle('navclosed'); try{localStorage.setItem('sd_navclosed',document.body.classList.contains('navclosed')?'1':'0');}catch(e){} } else { document.body.classList.toggle('navopen'); } }
el('menuBtn').onclick=toggleNav;
el('scrim').onclick=()=>document.body.classList.remove('navopen');
document.addEventListener('keydown', onKey);
// forward arrow keys from same-origin animation iframes (deck handles its own + hands off)
el('frame').addEventListener('load', ()=>{ try{ if(SEQ[cur].si!==0) el('frame').contentWindow.addEventListener('keydown', onKey); }catch(e){} });
(function init(){
  try{ if(window.innerWidth>860 && localStorage.getItem('sd_navclosed')==='1') document.body.classList.add('navclosed'); }catch(e){}
  let ui=0,ti=0,si=0; const p=new URLSearchParams(location.hash.replace(/^#/,''));
  if(p.get('u')){ const k=course.findIndex(U=>U.u===+p.get('u')); if(k>=0)ui=k; }
  if(p.get('t')){ const k=course[ui].topics.findIndex(tp=>tp.n===+p.get('t')); if(k>=0)ti=k; }
  if(p.get('s')){ const k=STEPS.findIndex(st=>st.k===p.get('s')); if(k>=0)si=k; }
  buildUnitSelect(); goto(ui,ti,si);
})();
